server:
  port: ${DATALAB_SERVER_PORT:8080}

spring:
  application:
    name: datalab-api
  datasource:
    url: ${DATALAB_DB_URL:jdbc:postgresql://localhost:5432/datalab}
    username: ${DATALAB_DB_USERNAME:datalab}
    password: ${DATALAB_DB_PASSWORD:datalab}
  jpa:
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates it matches the entities.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

datalab:
  storage:
    # Root directory for stored raw dataset files.
    data-dir: ${DATALAB_DATA_DIR:./data}
    # Default number of rows returned by the preview endpoint.
    preview-rows: 50

logging:
  level:
    com.justin.datalab: INFO
